<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.58/build/spline-viewer.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 80px;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: blue;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            font-weight: 800;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: blue;
        }

        body {
            padding-top: 60px;
        }

        spline-viewer {
            display: block;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .content-overlay {
            position: absolute;
            bottom: 150px;
            right: 80px;
            text-align: right;
            z-index: 100;
        }

        .text-line {
            font-size: 24px;
            font-weight: 800;
            color: rgb(0, 0, 0);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .explore-btn {
            background-color: blue;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .explore-btn:hover {
            background-color: darkblue;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid blue;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            font-weight: 800;
            color: blue;
        }

        .loading-spinner.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div style="position: relative; width: 100%; height: 100vh;">
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
        <spline-viewer id="splineViewer" url="https://prod.spline.design/PsqCChH9nSpx6vW6/scene.splinecode"></spline-viewer>
        <div class="content-overlay">
            <div class="text-line">This is a bottle of water stay hydrated</div>
            <button class="explore-btn">Explore Now</button>
        </div>
    </div>
    <nav>
        <div class="logo">HYDRO</div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#about">ABOUT</a></li>
        </ul>
    </nav>
    <script>
        const splineViewer = document.getElementById('splineViewer');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // Hide loading spinner when the spline viewer loads
        splineViewer.addEventListener('load', function() {
            loadingSpinner.classList.add('hidden');
        });

        // Fallback: hide loading spinner after 8 seconds if load event doesn't fire
        setTimeout(function() {
            loadingSpinner.classList.add('hidden');
        }, 1800);
    </script>
</body>
</html>
